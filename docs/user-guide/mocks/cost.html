<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cost Outflows — Mock</title>
    <style>
        :root {
            /* Backgrounds */
            --bccf-bg-50: #f7f8fa;
            --bccf-bg-100: #eef0f4;
            --bccf-surface: #ffffff;
            --bccf-border: #e2e6ec;
            /* Ink */
            --bccf-ink-500: #5b6472;
            --bccf-ink-700: #2f3742;
            --bccf-ink-900: #121821;
            /* Brand */
            --bccf-brand-500: #1f3b5e;
            --bccf-brand-600: #16304d;
            --bccf-brand-50: #eaeef4;
            /* Status */
            --bccf-success-500: #1f9d55;
            --bccf-success-50: #e7f6ec;
            --bccf-warn-500: #c97a0b;
            --bccf-warn-50: #fdf4e3;
            --bccf-danger-500: #c2361d;
            --bccf-danger-50: #fbeceb;
            /* Cost identity */
            --bccf-cost-500: #f97316;
            --bccf-cost-50:  #fff7ed;
            /* Type scale */
            --bccf-text-xs: 12px;
            --bccf-text-sm: 13px;
            --bccf-text-base: 14px;
            --bccf-text-lg: 16px;
            --bccf-text-xl: 20px;
            --bccf-text-2xl: 26px;
            /* Spacing */
            --bccf-s-1: 4px;  --bccf-s-2: 8px;  --bccf-s-3: 12px;
            --bccf-s-4: 16px; --bccf-s-5: 20px; --bccf-s-6: 24px; --bccf-s-8: 32px;
            /* Radius */
            --bccf-r-sm: 4px; --bccf-r-md: 6px; --bccf-r-lg: 10px; --bccf-r-full: 999px;
            /* Shadow + motion */
            --bccf-shadow-1: 0 1px 2px rgba(18,24,33,.04), 0 1px 1px rgba(18,24,33,.02);
            --bccf-shadow-2: 0 -4px 12px rgba(18,24,33,.04);
            --bccf-t-fast: 120ms;
        }
        body { font-family: "Inter", "Inter Variable", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; color: var(--bccf-ink-900); background: var(--bccf-bg-50); color-scheme: light; }
    
        /* Panel */
        .bccf-panel { background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-lg); box-shadow: var(--bccf-shadow-1); }
        .bccf-panel-header { padding: 14px 18px; border-bottom: 1px solid var(--bccf-border); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
        .bccf-panel-body { padding: 14px 18px; }
        .bccf-panel-footer { padding: 12px 18px; background: var(--bccf-bg-50); border-top: 1px solid var(--bccf-border); display: flex; justify-content: flex-end; gap: 8px; }

        /* Buttons */
        .bccf-btn { font-size: var(--bccf-text-sm); background: var(--bccf-surface); border: 1px solid var(--bccf-border); padding: 7px 14px; border-radius: var(--bccf-r-md); color: var(--bccf-ink-700); font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; min-height: 34px; transition: box-shadow var(--bccf-t-fast); }
        .bccf-btn:hover { box-shadow: var(--bccf-shadow-1); }
        .bccf-btn-pri { background: var(--bccf-brand-500); color: #fff; border-color: var(--bccf-brand-500); }
        .bccf-btn-pri:hover { background: var(--bccf-brand-600); }
        .bccf-btn-ghost { background: transparent; border-color: transparent; color: var(--bccf-brand-500); }
        .bccf-btn-danger-ghost { background: transparent; border-color: transparent; color: var(--bccf-danger-500); padding: 4px 8px; min-height: 0; }
        .bccf-btn-sm { min-height: 28px; padding: 4px 10px; font-size: var(--bccf-text-xs); }
        .bccf-add-row-btn { margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: transparent; border: 1px dashed var(--bccf-border); color: var(--bccf-ink-500); border-radius: var(--bccf-r-md); font-size: var(--bccf-text-sm); font-weight: 500; cursor: pointer; }
        .bccf-add-row-btn:hover { background: var(--bccf-bg-50); color: var(--bccf-brand-500); border-color: var(--bccf-brand-500); }

        /* Toggle / segmented control */
        .bccf-toggle { background: var(--bccf-bg-50); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-full); padding: 3px; display: inline-flex; gap: 2px; }
        .bccf-toggle button { font-size: var(--bccf-text-xs); padding: 4px 12px; border-radius: var(--bccf-r-full); color: var(--bccf-ink-500); border: 0; background: transparent; font-weight: 500; cursor: pointer; }
        .bccf-toggle button.active { background: var(--bccf-brand-500); color: #fff; }
        .bccf-pane-toggle { display: inline-flex; padding: 3px; background: var(--bccf-bg-100); border-radius: var(--bccf-r-full); }
        .bccf-pane-toggle button { font-size: var(--bccf-text-sm); padding: 6px 16px; border-radius: var(--bccf-r-full); background: transparent; border: 0; color: var(--bccf-ink-500); font-weight: 500; cursor: pointer; }
        .bccf-pane-toggle button.active.contract { background: var(--bccf-brand-500); color: #fff; }
        .bccf-pane-toggle button.active.estimate { background: var(--bccf-ink-700); color: #fff; }

        /* Tabs (underline) */
        .bccf-tabs { display: flex; gap: 4px; padding: 0 18px; border-bottom: 1px solid var(--bccf-border); background: var(--bccf-surface); }
        .bccf-tabs a { padding: 12px 14px; font-size: var(--bccf-text-sm); color: var(--bccf-ink-500); font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; text-decoration: none; cursor: pointer; }
        .bccf-tabs a.active.cashflow, .bccf-tabs a.active.brand { color: var(--bccf-brand-500); border-bottom-color: var(--bccf-brand-500); }
        .bccf-tabs a.active.accrual { color: var(--bccf-ink-700); border-bottom-color: var(--bccf-ink-500); }

        /* E1.5 slim KPI — reclaims sticky real estate for long forecasts */
        .bccf-kpi { background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-lg); padding: 8px 12px; }
        .bccf-kpi .bccf-k { font-size: var(--bccf-text-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--bccf-ink-500); font-weight: 500; }
        .bccf-kpi .bccf-v { font-size: var(--bccf-text-xl); font-weight: 600; color: var(--bccf-ink-900); letter-spacing: -0.01em; margin-top: 2px; line-height: 1.1; }
        .bccf-kpi .bccf-sub { font-size: var(--bccf-text-xs); color: var(--bccf-ink-500); margin-top: 3px; }
        .bccf-kpi.accent .bccf-v { color: var(--bccf-brand-500); }

        /* Badge */
        .bccf-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: var(--bccf-r-full); }
        .bccf-badge.success { background: var(--bccf-success-50); color: var(--bccf-success-500); }
        .bccf-badge.warn { background: var(--bccf-warn-50); color: var(--bccf-warn-500); }
        .bccf-badge.danger { background: var(--bccf-danger-50); color: var(--bccf-danger-500); }
        .bccf-badge.brand { background: var(--bccf-brand-50); color: var(--bccf-brand-500); }
        .bccf-badge.neutral { background: var(--bccf-bg-100); color: var(--bccf-ink-700); }

        /* Inputs */
        .bccf-input, .bccf-select, .bccf-date { font-size: var(--bccf-text-sm); padding: 7px 10px; border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); background: var(--bccf-surface); color: var(--bccf-ink-900); font-family: inherit; }
        .bccf-input:focus, .bccf-select:focus, .bccf-date:focus { outline: 2px solid var(--bccf-brand-500); outline-offset: -1px; border-color: var(--bccf-brand-500); }
        .bccf-input[readonly], .bccf-date[readonly] { background: var(--bccf-bg-100); color: var(--bccf-ink-700); cursor: default; }

        /* Skeleton shimmer */
        .bccf-skel { background: linear-gradient(90deg, #eef0f4 0%, #f7f8fa 50%, #eef0f4 100%); background-size: 200%; animation: bccf-shimmer 1.2s ease-in-out infinite; border-radius: var(--bccf-r-sm); display: inline-block; }
        @keyframes bccf-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Toast */
        #bccf-toast-host { position: fixed; top: 16px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
        .bccf-toast { background: var(--bccf-surface); border: 1px solid var(--bccf-border); box-shadow: var(--bccf-shadow-1); border-radius: var(--bccf-r-md); padding: 10px 14px; min-width: 320px; max-width: 440px; font-size: var(--bccf-text-sm); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; animation: bccf-toast-in 200ms ease-out; }
        .bccf-toast.info { border-left: 4px solid var(--bccf-brand-500); }
        .bccf-toast.warn { border-left: 4px solid var(--bccf-warn-500); }
        .bccf-toast.danger { border-left: 4px solid var(--bccf-danger-500); }
        .bccf-toast-close { background: transparent; border: 0; color: var(--bccf-ink-500); cursor: pointer; font-size: 14px; }
        @keyframes bccf-toast-in { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Modal / confirm */
        .bccf-modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,38,.55); display: flex; justify-content: center; padding-top: 60px; z-index: 100; }
        .bccf-modal { background: var(--bccf-surface); border-radius: var(--bccf-r-lg); box-shadow: 0 16px 48px rgba(0,0,0,.18); max-width: 480px; padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
        .bccf-modal-headline-warn { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--bccf-warn-500); font-weight: 600; }
        .bccf-modal-headline-danger { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--bccf-danger-500); font-weight: 600; }
        .bccf-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

        /* Error card */
        .bccf-error-card { background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-left: 4px solid var(--bccf-danger-500); border-radius: var(--bccf-r-md); padding: 14px 16px; margin: 12px 0; }
        .bccf-error-card h4 { font-size: var(--bccf-text-base); color: var(--bccf-danger-500); margin: 0 0 6px; font-weight: 600; }
        .bccf-error-card pre { font-size: 12px; color: var(--bccf-ink-700); white-space: pre-wrap; margin: 6px 0; }

        /* Chart bar (used by report shell SLs to render KPI chart bars) */
        .bccf-bar { width: 100%; border-radius: 3px 3px 0 0; transition: opacity var(--bccf-t-fast); cursor: default; }
        .bccf-bar:hover { opacity: .85; }
        .bccf-bar.revenue { background: var(--bccf-brand-500); }
        .bccf-bar.cost { background: var(--bccf-cost-500); }

        /* Title pill */
        .bccf-title-pill { display: inline-flex; align-items: center; background: var(--bccf-brand-50); color: var(--bccf-brand-500); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--bccf-r-full); }

        /* Date range picker (E1 spec §3.2) */
        .bccf-daterange { position: relative; display: inline-block; }
        .bccf-daterange-trigger { display: inline-flex; align-items: center; gap: 6px; background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); padding: 6px 12px; font-size: var(--bccf-text-sm); color: var(--bccf-ink-700); font-weight: 500; cursor: pointer; }
        .bccf-daterange-trigger:hover { background: var(--bccf-bg-50); }
        .bccf-daterange-trigger .bccf-daterange-label { color: var(--bccf-ink-900); }
        .bccf-daterange-trigger[disabled] { opacity: 0.6; cursor: not-allowed; }
        .bccf-daterange-panel { position: absolute; top: 100%; right: 0; margin-top: 6px; background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); box-shadow: 0 4px 16px rgba(18,24,33,.08); padding: 14px; min-width: 280px; z-index: 50; }
        .bccf-daterange-panel h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--bccf-ink-500); font-weight: 500; margin: 0 0 8px; }
        .bccf-daterange-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .bccf-daterange-presets button { font-size: var(--bccf-text-xs); padding: 6px 10px; border-radius: var(--bccf-r-md); background: var(--bccf-bg-50); border: 1px solid var(--bccf-border); color: var(--bccf-ink-700); font-weight: 500; cursor: pointer; text-align: center; }
        .bccf-daterange-presets button.active { background: var(--bccf-brand-500); color: #fff; border-color: var(--bccf-brand-500); }
        .bccf-daterange-custom { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .bccf-daterange-custom label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--bccf-ink-500); font-weight: 500; margin-bottom: 3px; }
        .bccf-daterange-custom input { width: 100%; padding: 6px 8px; font-size: var(--bccf-text-xs); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); font-family: inherit; }
        .bccf-daterange-custom input:focus { outline: 2px solid var(--bccf-brand-500); outline-offset: -1px; border-color: var(--bccf-brand-500); }
        .bccf-daterange-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--bccf-bg-100); }
        .bccf-daterange-hint { font-size: 11px; color: var(--bccf-ink-500); }
        .bccf-daterange-actions button[disabled] { opacity: 0.4; cursor: not-allowed; }

        /* Hover tooltip on bars — same pseudo-element pattern as .bccf-trend-dot.
           Used by all 3 report charts (Combined revenue+cost bars, Cost coral bars,
           Revenue navy bars). The bar gets data-tip="..." and the tooltip surfaces
           above it on hover. Replaces the old amount-always-visible-above-bar UI. */
        .bccf-bar { position: relative; }
        /* Hovered bar floats above its siblings so the ::after tooltip isn't
           clipped by an adjacent bar (e.g. Combined's Revenue+Cost pair). */
        .bccf-bar[data-tip]:hover { z-index: 10; }
        .bccf-bar[data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bccf-ink-900);
            color: #fff;
            padding: 5px 9px;
            border-radius: var(--bccf-r-md);
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            margin-bottom: 6px;
            transition: opacity var(--bccf-t-fast);
            z-index: 10;
        }
        .bccf-bar[data-tip]:hover::after { opacity: 1; }

        /* Trend-line dot with hover tooltip (Combined chart) */
        .bccf-trend-dot { cursor: default; }
        .bccf-trend-dot::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bccf-ink-900);
            color: #fff;
            padding: 5px 9px;
            border-radius: var(--bccf-r-md);
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            margin-bottom: 8px;
            transition: opacity var(--bccf-t-fast);
            z-index: 10;
        }
        .bccf-trend-dot:hover::after { opacity: 1; }

        /* E1.5 sticky layout — pins KPIs/chart/thead while tbody scrolls.
           Header panel is intentionally NOT sticky (controls, not context). */
        .bccf-layout #bccf-kpis {
            position: sticky;
            top: 0;
            z-index: 30;
            background: var(--bccf-bg-50);
            padding-top: 4px;
        }
        .bccf-layout #bccf-chart {
            position: sticky;
            top: 78px;
            z-index: 25;
            background: var(--bccf-bg-50);
        }
        /* Sticky-thead intentionally not used: position:sticky on <th>/<thead>
           interacts unpredictably with the .bccf-panel-body's overflow-x:auto
           (which establishes the sticky scroll container) inside NetSuite iframes,
           and reorders the thead row to the bottom of the table in observed cases.
           KPIs + chart remain sticky as the primary "context stays visible" UX;
           column headers scroll with the data. */

        /* Filters pill (E2 spec §3.6) — modeled on .bccf-daterange */
        .bccf-filters { position: relative; display: inline-block; }
        .bccf-filters-trigger { display: inline-flex; align-items: center; gap: 6px; background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); padding: 6px 12px; font-size: var(--bccf-text-sm); color: var(--bccf-ink-700); font-weight: 500; cursor: pointer; }
        .bccf-filters-trigger:hover { background: var(--bccf-bg-50); }
        .bccf-filters-trigger .bccf-filters-label { color: var(--bccf-ink-900); }
        .bccf-filters-panel { position: absolute; top: 100%; right: 0; margin-top: 6px; background: var(--bccf-surface); border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); box-shadow: 0 4px 16px rgba(18,24,33,.08); padding: 14px; min-width: 340px; max-width: 420px; z-index: 50; }
        .bccf-filters-panel h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--bccf-ink-500); font-weight: 500; margin: 0 0 8px; }

        /* Active toggle (E2 pivot — single boolean checkbox-style chip).
           Replaces the spec's 4-state status segmented control. */
        .bccf-filters-active { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .bccf-filters-active input[type="checkbox"] { cursor: pointer; }
        .bccf-filters-active label { font-size: var(--bccf-text-sm); color: var(--bccf-ink-700); cursor: pointer; }

        .bccf-filters-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
        .bccf-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 4px 3px 10px; background: var(--bccf-brand-50); color: var(--bccf-brand-500); border-radius: var(--bccf-r-full); font-size: var(--bccf-text-xs); font-weight: 500; }
        .bccf-chip-x { background: transparent; border: 0; color: var(--bccf-brand-500); cursor: pointer; padding: 0 4px; line-height: 1; font-size: 14px; }
        .bccf-chip-x:hover { color: var(--bccf-brand-600); }
        .bccf-filters-add { font-size: var(--bccf-text-xs); padding: 4px 6px; border: 1px solid var(--bccf-border); border-radius: var(--bccf-r-md); background: var(--bccf-surface); cursor: pointer; max-width: 220px; }

        .bccf-filters-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--bccf-bg-100); }
    </style>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { padding: 16px; background: var(--bccf-bg-50); }
        .bccf-layout { display: flex; flex-direction: column; gap: 16px; }
        table tbody tr:hover { background: var(--bccf-bg-50); }
        .bccf-kpi.accent .bccf-v { color: inherit; }
    </style>
</head>
<body data-data-url="mock://cost">
    <div id="bccf-toast-host"></div>
    <div class="bccf-layout">
        <div class="bccf-panel"><div class="bccf-panel-header">
            <div style="display:flex;align-items:center;gap:10px">
                <h1 style="margin:0;font-size:var(--bccf-text-xl);font-weight:700;color:var(--bccf-ink-900)">
                    Cost Outflows
                </h1>
                <span class="bccf-badge brand bccf-title-pill">Accrual basis</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
                
            <div class="bccf-daterange" id="bccf-daterange"
                 data-start="2026-02"
                 data-end="2027-01">
                <button type="button" class="bccf-daterange-trigger" data-action="open-daterange">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span class="bccf-daterange-label">Feb 2026 – Jan 2027</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="bccf-daterange-panel" style="display:none">
                    <h4>Quick ranges</h4>
                    <div class="bccf-daterange-presets"><button type="button" data-preset="8">8 months</button><button type="button" data-preset="12" class="active">12 months</button><button type="button" data-preset="18">18 months</button><button type="button" data-preset="24">24 months</button></div>
                    <h4>Custom range</h4>
                    <div class="bccf-daterange-custom">
                        <div>
                            <label>From</label>
                            <input type="month" data-input="from" value="2026-02" />
                        </div>
                        <div>
                            <label>To</label>
                            <input type="month" data-input="to" value="2027-01" />
                        </div>

<script>
(function () {
    'use strict';

    // ── Double-evaluation guard ──────────────────────────────────────────────
    if (window.__bccfWiredCost) return;
    window.__bccfWiredCost = true;

    // ── Helpers ──────────────────────────────────────────────────────────────

    /**
     * Format a number as currency.
     *   Positive:  $1,005.00
     *   Negative:  −$1,500.00   (Unicode minus U+2212, not ASCII hyphen)
     */
    function fmtCurrency(n) {
        var abs = Math.abs(n);
        var formatted = abs.toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
        return (n < 0 ? '\u2212' : '') + '$' + formatted;
    }

    /**
     * Format a percentage.
     *   23.4 → "23.4%"   −4.2 → "−4.2%"
     */
    function fmtPct(n) {
        return (n < 0 ? '\u2212' : '') + Math.abs(n).toFixed(1) + '%';
    }

    /** Minimal HTML escape for injected text. */
    function esc(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Toast ────────────────────────────────────────────────────────────────

    function toast(type, message) {
        var host = document.getElementById('bccf-toast-host');
        if (!host) {
            host = document.createElement('div');
            host.id = 'bccf-toast-host';
            document.body.appendChild(host);
        }
        var t = document.createElement('div');
        t.className = 'bccf-toast ' + type;
        t.innerHTML = '<span>' + esc(message) + '</span>'
            + '<button type="button" class="bccf-toast-close" data-action="close-toast">\u00d7</button>';
        host.appendChild(t);
        setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 4500);
    }

    // ── Current YYYY-MM ──────────────────────────────────────────────────────

    function currentYYYYMM() {
        var now = new Date();
        return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    }

    /** Convert a period label "Apr 2026" back to YYYY-MM for comparison */
    function labelToYYYYMM(label) {
        var MONTHS = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
                      Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
        var parts = label.split(' ');
        if (parts.length < 2) return '';
        return parts[1] + '-' + (MONTHS[parts[0]] || '00');
    }

    // ── Render KPI strip ─────────────────────────────────────────────────────

    /**
     * Build 4 KPI cards for cost-only view:
     *   Total Cost     — accent class, slate value (--bccf-ink-500) per §3.7
     *   Current Month  — default ink, shows current month amount
     *   Peak Month     — default ink, shows highest month amount
     *   Remaining      — default ink, cost from current month to end
     *
     * Per spec §3.6, §3.7 — bccf-k / bccf-v / bccf-sub inner classes.
     */
    function renderKpis(kpis, projectTotals) {
        projectTotals = projectTotals || { cost: 0 };

        var totalCost    = kpis.totalCost    || 0;
        var currentMonth = kpis.currentMonth || 0;
        var peakMonth    = kpis.peakMonth    || 0;
        var remaining    = kpis.remaining    || 0;
        var projCost     = projectTotals.cost || 0;

        var currentPct = totalCost ? fmtPct((currentMonth / totalCost) * 100) : '0.0%';
        var peakPct    = totalCost ? fmtPct((peakMonth    / totalCost) * 100) : '0.0%';
        var remPct     = totalCost ? fmtPct((remaining    / totalCost) * 100) : '0.0%';

        var cards = [
            // 1. Total Cost (range) — subline shows project total
            '<div class="bccf-kpi accent">'
                + '<div class="bccf-k">Total Cost</div>'
                + '<div class="bccf-v" style="color:var(--bccf-cost-500)">' + esc(fmtCurrency(totalCost)) + '</div>'
                + '<div class="bccf-sub">' + esc(fmtCurrency(projCost)) + ' project total</div>'
            + '</div>',

            // 2. Current Month (in range, else 0)
            '<div class="bccf-kpi">'
                + '<div class="bccf-k">Current Month</div>'
                + '<div class="bccf-v">' + esc(fmtCurrency(currentMonth)) + '</div>'
                + '<div class="bccf-sub">' + esc(currentPct) + ' of range</div>'
            + '</div>',

            // 3. Peak Month (in range)
            '<div class="bccf-kpi">'
                + '<div class="bccf-k">Peak Month</div>'
                + '<div class="bccf-v">' + esc(fmtCurrency(peakMonth)) + '</div>'
                + '<div class="bccf-sub">' + esc(peakPct) + ' of range</div>'
            + '</div>',

            // 4. Remaining (in range, from current month onward)
            '<div class="bccf-kpi">'
                + '<div class="bccf-k">Remaining</div>'
                + '<div class="bccf-v">' + esc(fmtCurrency(remaining)) + '</div>'
                + '<div class="bccf-sub">' + esc(remPct) + ' of range</div>'
            + '</div>'
        ];

        // Return only inner cards — the outer #bccf-kpis wrapper stays in the DOM (Bug 1 fix)
        return cards.join('');
    }

    // ── Render Chart ─────────────────────────────────────────────────────────

    /**
     * Single bar per month, slate color (--bccf-ink-500), using .bccf-bar.cost class.
     * Amount label above each bar.
     * Current month gets .now class: brand-50 halo + bolded label + ▲ glyph.
     * Heights normalized to largest bar amount in the dataset.
     * Spec §3.8.
     */
    function renderChart(periods, categories) {
        var costTotal = categories.cost.total;
        var BAR_MAX_H = 140; // px

        // Find max for normalization
        var maxAmt = costTotal.reduce(function(m, v) { return Math.max(m, v); }, 1);

        function barH(v) {
            return Math.max(2, Math.round((v / maxAmt) * BAR_MAX_H));
        }

        var curYYYYMM = currentYYYYMM();

        // E1.5: bars and labels live in separate rows so the halo splits cleanly
        // across top-rounded (bars row) and bottom-rounded (labels row).
        // Each cost bar gets data-tip="$..." — dollar amount via fmtCurrency (no native title).
        var barCols = periods.map(function(label, i) {
            var cost  = costTotal[i] || 0;
            var isNow = labelToYYYYMM(label) === curYYYYMM;
            var h = barH(cost);
            var haloStyle = isNow ? 'background:var(--bccf-brand-50);border-radius:6px 6px 0 0;' : '';
            return '<div style="display:flex;flex-direction:column;justify-content:flex-end;align-items:center;flex:1;min-width:48px;height:' + BAR_MAX_H + 'px;' + haloStyle + '">'
                + '<div style="display:flex;align-items:flex-end">'
                    + '<div class="bccf-bar cost" data-tip="' + esc(fmtCurrency(cost)) + '" style="width:24px;height:' + h + 'px;border-radius:3px 3px 0 0"></div>'
                + '</div>'
            + '</div>';
        });

        var labelCols = periods.map(function(label, i) {
            var isNow = labelToYYYYMM(label) === curYYYYMM;
            var haloStyle = isNow ? 'background:var(--bccf-brand-50);border-radius:0 0 6px 6px;' : '';
            return '<div style="flex:1;min-width:48px;text-align:center;font-size:11px;color:var(--bccf-ink-500);padding:6px 0;' + haloStyle + '">'
                + esc(label)
            + '</div>';
        });

        var headerHtml = '<span style="font-size:var(--bccf-text-base);font-weight:600;color:var(--bccf-ink-900)">Monthly Cost Outflow</span>';

        var barsHtml = '<div>'
            + '<div style="display:flex;align-items:flex-end;gap:8px;padding:16px 0 0">' + barCols.join('') + '</div>'
            + '<div style="display:flex;gap:8px">' + labelCols.join('') + '</div>'
        + '</div>';

        return '<div class="bccf-panel" style="margin-bottom:16px">'
            + '<div class="bccf-panel-header">' + headerHtml + '</div>'
            + '<div class="bccf-panel-body">' + barsHtml + '</div>'
        + '</div>';
    }

    // ── Render Table ─────────────────────────────────────────────────────────

    /**
     * Cost-only table:
     *   thead: Source | <period labels> | Total
     *   tbody: "Cost Forecast" category row (bold, slate) + sub-rows per line (indented)
     *   tfoot: Grand Total row — no Net row (cost-only report)

    function renderTable(periods, categories) {

                ? '<span style="margin-left:4px;color:var(--bccf-brand-500)">' + glyph + '</span>'
                : '';
            var alignStyle = align === 'left' ? 'text-align:left' : 'text-align:right';
            return '<th data-sort-col="' + esc(sortKey) + '" '
                + 'style="padding:8px 12px;font-size:12px;color:var(--bccf-ink-500);'

        function totalRow(label, totals, grandTotal, color) {
            var cells = totals.map(function(v) {
                return '<td style="padding:8px 12px;text-align:right;font-size:var(--bccf-text-sm);font-weight:600;color:' + color + ';font-variant-numeric:tabular-nums;border-top:1px solid var(--bccf-border)">'
                    + esc(fmtCurrency(v)) + '</td>';
            }).join('');
            return '<tr>'
                + '<td style="padding:8px 12px;font-size:var(--bccf-text-sm);font-weight:600;color:' + color + ';border-top:1px solid var(--bccf-border)">' + esc(label) + '</td>'
                + cells
                + '<td style="padding:8px 12px;text-align:right;font-size:var(--bccf-text-sm);font-weight:700;color:' + color + ';border-top:1px solid var(--bccf-border);font-variant-numeric:tabular-nums">' + esc(fmtCurrency(grandTotal)) + '</td>'
            + '</tr>';
        }

        // ── tbody ──
        var costRows = cost.lines.map(lineRow).join('');

        var tbody = '<tbody>'
            + catRow('Cost Forecast', 'var(--bccf-cost-500)')
            + costRows
            + totalRow('Total', cost.total, cost.grandTotal, 'var(--bccf-cost-500)')
        + '</tbody>';

        // ── tfoot: Grand Total — no Net row for cost-only ──
        var totalCells = cost.total.map(function(v) {
            return '<td style="padding:8px 12px;text-align:right;font-size:var(--bccf-text-sm);font-weight:600;color:var(--bccf-ink-900);border-top:2px solid var(--bccf-border);font-variant-numeric:tabular-nums">'
                + esc(fmtCurrency(v)) + '</td>';
        }).join('');

        var tfoot = '<tfoot><tr>'
            + '<td style="padding:8px 12px;font-size:var(--bccf-text-sm);font-weight:700;color:var(--bccf-ink-900);border-top:2px solid var(--bccf-border)">Grand Total</td>'
            + totalCells
            + '<td style="padding:8px 12px;text-align:right;font-size:var(--bccf-text-sm);font-weight:700;color:var(--bccf-ink-900);border-top:2px solid var(--bccf-border);font-variant-numeric:tabular-nums">' + esc(fmtCurrency(cost.grandTotal)) + '</td>'
        + '</tr></tfoot>';

        return '<div class="bccf-panel">'
            + '<div class="bccf-panel-body" style="padding:0;overflow-x:auto">'
                + '<table style="width:100%;border-collapse:collapse">'
                    + thead + tbody + tfoot
                + '</table>'
            + '</div>'
        + '</div>';
    }

    // ── Error card ───────────────────────────────────────────────────────────

    function renderError(message) {
        return '<div class="bccf-error-card">'
            + '<h4>Couldn\u2019t load data</h4>'
            + '<pre>' + esc(message) + '</pre>'
            + '<button type="button" class="bccf-btn" data-action="retry">Retry</button>'
        + '</div>';
    }

    // ── Fetch + render ───────────────────────────────────────────────────────

    var _lastDataUrl = null;
    var _lastData = null;

    // Skeleton HTML strings for re-painting regions on refresh (Bug 2 fix)
    var SKEL_KPIS = (function() {
        var cards = '';
        ['Total Cost','Current Month','Peak Month','Remaining'].forEach(function(label) {
            cards += '<div class="bccf-kpi">'
                + '<div class="bccf-k">' + esc(label) + '</div>'
                + '<div class="bccf-v"><span class="bccf-skel" style="display:block;width:140px;height:24px;margin-top:4px"></span></div>'
                + '<div class="bccf-sub"><span class="bccf-skel" style="display:block;width:100px;height:11px;margin-top:6px"></span></div>'
                + '</div>';
        });
        return cards;
    }());

    var SKEL_CHART = (function() {
        var heights = [40, 70, 100, 90, 60, 30];
        var bars = heights.map(function(h) {
            return '<div class="bccf-skel bar-skel" style="flex:1;height:' + h + 'px;margin:0 3px;border-radius:3px 3px 0 0"></div>';
        }).join('');
        return '<div class="bccf-panel" style="margin-bottom:16px">'
            + '<div class="bccf-panel-header"><span style="font-size:var(--bccf-text-base);font-weight:600;color:var(--bccf-ink-900)">Monthly Cost Outflow</span></div>'
            + '<div class="bccf-panel-body"><div style="display:flex;align-items:flex-end;height:120px;padding:14px 18px">' + bars + '</div></div>'
            + '</div>';
    }());

    var SKEL_TABLE = (function() {
        var widths = [80, 60, 70, 65, 75, 55, 90];
        var rows = '';
        for (var r = 0; r < 5; r++) {
            rows += '<tr>';
            for (var c = 0; c < 8; c++) {
                var w = widths[(r + c) % widths.length];
                rows += '<td><span class="bccf-skel" style="display:inline-block;width:' + w + 'px;height:12px"></span></td>';
            }
            rows += '</tr>';
        }
        return '<div class="bccf-panel">'
            + '<div class="bccf-panel-body" style="padding:0;overflow-x:auto">'
            + '<table style="width:100%;border-collapse:collapse"><tbody>' + rows + '</tbody></table>'
            + '</div></div>';
    }());

    function loadData(dataUrl) {
        _lastDataUrl = dataUrl;

        // Bug 2: repaint skeletons immediately so user sees loading state on refresh
        var kpiElSkel = document.getElementById('bccf-kpis');
        if (kpiElSkel) kpiElSkel.innerHTML = SKEL_KPIS;
        var chartElSkel = document.getElementById('bccf-chart');
        if (chartElSkel) chartElSkel.innerHTML = SKEL_CHART;
        var tableElSkel = document.getElementById('bccf-table');
        if (tableElSkel) tableElSkel.innerHTML = SKEL_TABLE;

        fetch(dataUrl)
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                if (!data.ok) throw new Error(data.error || 'Data SL returned ok:false');
                _lastData = data;
                applyBoundsToPicker(data.availableBounds);

                // Bug 1: use innerHTML on stable wrapper divs (IDs never destroyed)
                var kpiEl = document.getElementById('bccf-kpis');
                if (kpiEl) kpiEl.innerHTML = renderKpis(data.kpis, data.projectTotals);

                var chartEl = document.getElementById('bccf-chart');
                if (chartEl) chartEl.innerHTML = renderChart(data.periods, data.categories);

                var tableEl = document.getElementById('bccf-table');
                if (tableEl) tableEl.innerHTML = renderTable(data.periods, data.categories);
            })
            .catch(function(err) {
                var errHtml = renderError(err.message || String(err));

                var kpiEl = document.getElementById('bccf-kpis');
                if (kpiEl) {
                    kpiEl.innerHTML = '<div class="bccf-error-card" style="grid-column:1/-1"><h4>Couldn\u2019t load report data</h4><pre>' + esc(err.message || 'Unknown error') + '</pre><button type="button" class="bccf-btn" data-action="retry">Retry</button></div>';
                }
                var chartEl = document.getElementById('bccf-chart');
                if (chartEl) chartEl.innerHTML = errHtml;
                var tableEl = document.getElementById('bccf-table');
                if (tableEl) tableEl.innerHTML = errHtml;
            });
    }

    // ── URL param swap for mode toggle ───────────────────────────────────────

    function swapModeUrl(currentUrl, newMode) {
        var u = new URL(currentUrl, window.location.href);
        u.searchParams.set('mode', newMode);
        return u.toString();
    }

    // ── Date range picker (E1 spec §3.2) ─────────────────────────────────────

    /**
     * Add N months to a YYYY-MM string. UTC-safe.
     */
    function addMonths(yyyymm, n) {
        var parts = yyyymm.split('-');
        var y = Number(parts[0]);
        var m = Number(parts[1]);
        var d = new Date(Date.UTC(y, (m - 1) + n, 1));
        return d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0');
    }

    function monthsBetween(s, e) {
        var sp = s.split('-').map(Number);
        var ep = e.split('-').map(Number);
        return (ep[0] - sp[0]) * 12 + (ep[1] - sp[1]) + 1;
    }

    /** Center N-month window around the current month: -floor(N/4) / +(N - floor(N/4) - 1) per spec preset behavior. */
    function presetWindow(n) {
        var now = new Date();
        var cur = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '00');
        var back = Math.floor(n / 4);  // 8->2, 12->3, 18->4, 24->6
        return { startPeriod: addMonths(cur, -back), endPeriod: addMonths(cur, n - back - 1) };
    }

    function pickerEl() { return document.getElementById('bccf-daterange'); }
    function pickerPanel() { var p = pickerEl(); return p ? p.querySelector('.bccf-daterange-panel') : null; }
    function pickerFrom()  { var p = pickerEl(); return p ? p.querySelector('[data-input="from"]') : null; }
    function pickerTo()    { var p = pickerEl(); return p ? p.querySelector('[data-input="to"]')   : null; }
    function pickerApply() { var p = pickerEl(); return p ? p.querySelector('[data-action="apply-daterange"]') : null; }

    function setActivePreset(n) {
        var p = pickerEl();
        if (!p) return;
        p.querySelectorAll('[data-preset]').forEach(function(b) {
            b.classList.toggle('active', String(n) === b.dataset.preset);
        });
    }

    function clearActivePreset() {
        var p = pickerEl();
        if (!p) return;
        p.querySelectorAll('[data-preset]').forEach(function(b) { b.classList.remove('active'); });
    }

    /**
     * Validate the custom From/To inputs. Returns null if valid (then enables Apply),
     * or a short message if invalid (then disables Apply).
     */
    function validatePickerInputs() {
        var from = pickerFrom();
        var to   = pickerTo();
        var apply = pickerApply();
        if (!from || !to || !apply) return 'init';
        var f = from.value;
        var t = to.value;
        var ok = /^\d{4}-(0[1-9]|1[0-2])$/.test(f) && /^\d{4}-(0[1-9]|1[0-2])$/.test(t);
        if (!ok) {
            apply.disabled = true;
            return 'Invalid month';
        }
        if (f > t) {
            apply.disabled = true;
            return 'From must be on or before To';
        }
        if (monthsBetween(f, t) > 24) {
            apply.disabled = true;
            return 'Maximum 24 months';
        }
        apply.disabled = false;
        return null;
    }

    function openPicker() {
        var panel = pickerPanel();
        if (panel) panel.style.display = 'block';
    }
    function closePicker() {
        var panel = pickerPanel();
        if (panel) panel.style.display = 'none';
    }

    function applyPicker() {
        var from = pickerFrom();
        var to   = pickerTo();
        if (!from || !to) return;
        if (validatePickerInputs() !== null) return;  // re-check
        var u = new URL(window.location.href);
        u.searchParams.set('startPeriod', from.value);
        u.searchParams.set('endPeriod',   to.value);
        window.location.replace(u.toString());
    }

    // Wire picker events
    document.addEventListener('click', function(e) {
        // Open/close on trigger
        var trigger = e.target.closest('[data-action="open-daterange"]');
        if (trigger) {
            var panel = pickerPanel();
            var isOpen = panel && panel.style.display === 'block';
            if (isOpen) closePicker(); else openPicker();
            return;
        }
        // Apply
        if (e.target.closest('[data-action="apply-daterange"]')) {
            applyPicker();
            return;
        }
        // Preset chip
        var preset = e.target.closest('[data-preset]');
        if (preset) {
            var n = Number(preset.dataset.preset);
            var win = presetWindow(n);
            var from = pickerFrom();
            var to   = pickerTo();
            if (from) from.value = win.startPeriod;
            if (to)   to.value   = win.endPeriod;
            setActivePreset(n);
            validatePickerInputs();
            return;
        }
        // Outside click closes panel
        var p = pickerEl();
        if (p && !p.contains(e.target)) closePicker();
    }, true);

    // Custom input edits clear preset + revalidate
    document.addEventListener('input', function(e) {
        if (!e.target.matches('[data-input="from"], [data-input="to"]')) return;
        clearActivePreset();
        validatePickerInputs();
    });

    // Esc closes panel
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePicker();
    });

    /**
     * After the JSON fetch resolves, clamp the from/to inputs to availableBounds
     * so the native month-picker UI honors the project's actual data window.
     */
    function applyBoundsToPicker(availableBounds) {
        if (!availableBounds) return;
        var from = pickerFrom();
        var to   = pickerTo();
        if (from) {
            from.setAttribute('min', availableBounds.minPeriod);
            from.setAttribute('max', availableBounds.maxPeriod);
        }
        if (to) {
            to.setAttribute('min', availableBounds.minPeriod);
            to.setAttribute('max', availableBounds.maxPeriod);
        }
    }

    // ── Sortable headers (E1.5 spec §3.3) ────────────────────────────────────

    // Lives in the IIFE closure: survives mode toggle + refresh (JSON re-fetch
    // keeps IIFE alive), resets on picker Apply (window.location.replace
    // re-evaluates the IIFE). Spec D8.
    var _sortState = { col: 'source', dir: 'desc' };

    /**
     * Returns a new array of lines sorted by sortState. Never mutates input.
     * Rules:
     *  - col='source' → compare createdDate strings (lexicographic == chronological for YYYY-MM-DD)
     *  - col='total'  → compare line.total
     *  - col=<period> → compare amounts[periodIdx]; missing = 0
     *  - null createdDate always sorts to end (regardless of dir)
     *  - dir='desc' = largest first / newest first; dir='asc' = smallest first / oldest first
     */
    function sortLines(lines, periods, sortState) {
        if (!lines || !lines.length) return lines;
        var sorted = lines.slice();
        var dir = sortState.dir === 'asc' ? 1 : -1;

        sorted.sort(function(a, b) {
            var va, vb;
            if (sortState.col === 'source') {
                va = a.createdDate;
                vb = b.createdDate;
                if (va === null && vb === null) return 0;
                if (va === null) return 1;
                if (vb === null) return -1;
                return va < vb ? -dir : (va > vb ? dir : 0);
            }
            if (sortState.col === 'total') {
                va = a.total || 0;
                vb = b.total || 0;
            } else {
                var idx = periods.indexOf(sortState.col);
                if (idx === -1) return 0;
                va = (a.amounts && a.amounts[idx]) || 0;
                vb = (b.amounts && b.amounts[idx]) || 0;
            }
            return va < vb ? -dir : (va > vb ? dir : 0);
        });

        return sorted;
    }

    // Click handler — 2-state on Source, 3-state on Period/Total.
    // Independent of the existing picker / mode-toggle handlers; each fires
    // on every click and short-circuits if its target isn't matched.
    document.addEventListener('click', function(e) {
        var th = e.target.closest('[data-sort-col]');
        if (!th) return;

        var col = th.dataset.sortCol;
        var was = _sortState;

        if (col === 'source') {
            // 2-state: desc ↔ asc
            _sortState = (was.col === 'source' && was.dir === 'desc')
                ? { col: 'source', dir: 'asc' }
                : { col: 'source', dir: 'desc' };
        } else {
            // 3-state: desc → asc → reset (Source desc)
            if (was.col !== col) {
                _sortState = { col: col, dir: 'desc' };
            } else if (was.dir === 'desc') {
                _sortState = { col: col, dir: 'asc' };
            } else {
                _sortState = { col: 'source', dir: 'desc' };
            }
        }

        if (_lastData) {
            var tableEl = document.getElementById('bccf-table');
            if (tableEl) tableEl.innerHTML = renderTable(_lastData.periods, _lastData.categories);
        }
    });

    // ── Event delegation ─────────────────────────────────────────────────────

    document.addEventListener('click', function(e) {
        // Mode toggle — check BEFORE [data-action] guard because toggle buttons
        // only carry data-value, not data-action.
        var toggleBtn = e.target.closest('[data-toggle-id="mode"] button');
        if (toggleBtn) {
            if (toggleBtn.classList.contains('active')) return;  // already in this mode — no-op
            var newMode = toggleBtn.dataset.value;
            if (!newMode || !_lastDataUrl) return;
            // Update active class
            toggleBtn.closest('.bccf-toggle').querySelectorAll('button').forEach(function(b) {
                b.classList.toggle('active', b.dataset.value === newMode);
            });
            var newUrl = swapModeUrl(_lastDataUrl, newMode);
            loadData(newUrl);
            // Sync the iframe's own URL bar so the picker's Apply (which reads window.location.href)
            // preserves the active mode across the reload.
            try {
                var iframeUrl = new URL(window.location.href);
                iframeUrl.searchParams.set('mode', newMode);
                history.replaceState(null, '', iframeUrl.toString());
            } catch (err) { /* iframe history may be restricted; non-fatal */ }
            return;
        }

        var btn = e.target.closest('[data-action]');
        if (!btn) return;
        var action = btn.dataset.action;

        if (action === 'refresh') {
            loadData(_lastDataUrl);
            return;
        }

        if (action === 'retry') {
            if (_lastDataUrl) loadData(_lastDataUrl);
            return;
        }

        if (action === 'close-toast') {
            var t = btn.closest('.bccf-toast');
            if (t && t.parentNode) t.parentNode.removeChild(t);
            return;
        }
    });

    // ── Boot ─────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', function() {
        var dataUrl = document.body.dataset.dataUrl;
        if (dataUrl) loadData(dataUrl);
    });

})();
</script>
</body>
</html>
